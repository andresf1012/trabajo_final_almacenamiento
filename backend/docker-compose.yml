services:
  mongo:
    image: mongo:7
    container_name: mongodb-reservas
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: .
    container_name: backend-reservas
    ports:
      - "3000:3000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/base_datos_docu
    depends_on:
      - mongo

volumes:
  mongo_data:
